name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: src

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: paymentlink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paymentlink_test
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paymentlink_test
      RELAX_ENV_VALIDATION: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma migrate
        run: npx prisma migrate deploy

      - name: Unit & integration tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E smoke
        run: npm run test:e2e
