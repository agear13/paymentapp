name: CI

on:
  push:
    branches: [main, master]
  pull_request:

defaults:
  run:
    working-directory: src

env:
  RELAX_ENV_VALIDATION: '1'
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paymentlink_test
  DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paymentlink_test

jobs:
  build-integrity:
    name: Build integrity
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: paymentlink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- .

      - name: Typecheck (operational graph)
        run: npm run typecheck

      - name: Duplicate import scan
        run: npm run check:duplicate-imports

      - name: Circular dependency scan
        run: npm run check:circular-deps

      - name: Operational architecture tests
        run: npm run test:operations

      - name: Prisma migrate (build prerequisite)
        run: npx prisma migrate deploy

      - name: Production build
        run: npm run build
