# Provvypay Production Infrastructure on Render
#
# B3: HTTP-triggered jobs run on provvypay-api; Render cron services invoke them via
#     scripts/render-cron-invoke.mjs with CRON_SECRET (see docs/b3-*.md).
#
# Services:
#   - Web: Next.js API server (health: /api/health)
#   - Cron: Scheduled HTTP invokes (one target per service)
#   - Worker: [not enabled] — use API jobs + cron only
#   - Database: Native Postgres
#
# Setup:
#   1. Create Environment Group "provvypay-production" with CRON_SECRET + app URL
#   2. Push this file → Render Blueprint → Apply
#   3. Shell into web service → npx prisma migrate deploy

services:
  # Main API Server
  - type: web
    name: provvypay-api
    env: node
    region: oregon
    plan: starter
    branch: main
    rootDir: src
    buildCommand: npm ci --include=dev --legacy-peer-deps && BUILD_ID=${RENDER_GIT_COMMIT:-unknown} GIT_SHA=${RENDER_GIT_COMMIT:-unknown} npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    minInstances: 1
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: ALLOW_INFRASTRUCTURE_DOMAINS
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: ASSET_CDN_URL
        sync: false
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: provvypay-db
          property: connectionString
      - fromGroup: provvypay-production

  # --- B3: Scheduled background jobs (HTTP → provvypay-api) ---
  - type: cron
    name: provvypay-cron-expired-links
    env: node
    region: oregon
    schedule: "*/5 * * * *"
    branch: main
    rootDir: src
    buildCommand: "true"
    startCommand: node scripts/render-cron-invoke.mjs expired-links
    envVars:
      - fromGroup: provvypay-production

  - type: cron
    name: provvypay-cron-recurring-templates
    env: node
    region: oregon
    schedule: "*/5 * * * *"
    branch: main
    rootDir: src
    buildCommand: "true"
    startCommand: node scripts/render-cron-invoke.mjs recurring-templates
    envVars:
      - fromGroup: provvypay-production

  - type: cron
    name: provvypay-cron-xero-queue
    env: node
    region: oregon
    schedule: "*/5 * * * *"
    branch: main
    rootDir: src
    buildCommand: "true"
    startCommand: node scripts/render-cron-invoke.mjs xero-queue
    envVars:
      - fromGroup: provvypay-production

  - type: cron
    name: provvypay-cron-stuck-payments
    env: node
    region: oregon
    schedule: "*/15 * * * *"
    branch: main
    rootDir: src
    buildCommand: "true"
    startCommand: node scripts/render-cron-invoke.mjs stuck-payments
    envVars:
      - fromGroup: provvypay-production

  - type: cron
    name: provvypay-cron-stripe-reconciliation
    env: node
    region: oregon
    schedule: "*/10 * * * *"
    branch: main
    rootDir: src
    buildCommand: "true"
    startCommand: node scripts/render-cron-invoke.mjs stripe-reconciliation
    envVars:
      - fromGroup: provvypay-production

  - type: cron
    name: provvypay-cron-ledger-integrity
    env: node
    region: oregon
    schedule: "0 */6 * * *"
    branch: main
    rootDir: src
    buildCommand: "true"
    startCommand: node scripts/render-cron-invoke.mjs ledger-integrity
    envVars:
      - fromGroup: provvypay-production

  - type: cron
    name: provvypay-cron-system-integrity
    env: node
    region: oregon
    schedule: "0 */4 * * *"
    branch: main
    rootDir: src
    buildCommand: "true"
    startCommand: node scripts/render-cron-invoke.mjs system-integrity
    envVars:
      - fromGroup: provvypay-production

  - type: cron
    name: provvypay-cron-monitoring-alerts
    env: node
    region: oregon
    schedule: "0 * * * *"
    branch: main
    rootDir: src
    buildCommand: "true"
    startCommand: node scripts/render-cron-invoke.mjs monitoring-alerts
    envVars:
      - fromGroup: provvypay-production

  # Background Worker — not used (B3 uses HTTP jobs on web + cron invoke)
  # - type: worker
  #   name: provvypay-worker
  #   ...

databases:
  - name: provvypay-db
    databaseName: provvypay_production
    user: provvypay
    region: oregon
    plan: basic-1gb
